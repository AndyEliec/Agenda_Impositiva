<section class="login-wrap d-flex align-items-center justify-content-center min-vh-100">
  <div class="card-ui login-card p-4 shadow" style="width: 100%; max-width: 400px;">
    <div class="text-center mb-4">
      <div class="bg-primary text-white rounded-3 d-inline-flex p-3 mb-3 shadow">
        <i class="bi bi-calendar2-check-fill fs-3"></i>
      </div>
      <h4 class="fw-bold m-0 text-light">Agenda Impositiva</h4>
      <p class="form-label text-muted small fw-semibold uppercase">Acceso seguro para operadores del estudio</p>
    </div>

    <!-- Alerta de Errores -->
    <div id="login-error" class="alert alert-danger d-none py-2 px-3 mb-3 small" role="alert"></div>

    <form id="login-form" onsubmit="ejecutarIngresoSistema(event)">
      <!-- Usuario -->
      <div class="mb-3">
        <label class="form-label text-muted small fw-semibold uppercase">Usuario</label>
        <div class="position-relative">
          <input type="text" id="login-usuario" name="usuario" required class="form-control" placeholder="ejemplo" style="padding-left: 2.5rem;">
          <i class="bi bi-person position-absolute text-muted" style="left: 1rem; top: 50%; transform: translateY(-50%);"></i>
        </div>
      </div>

      <!-- Contraseña -->
      <div class="mb-4">
        <label class="form-label text-muted small fw-semibold uppercase">Contraseña</label>
        <div class="position-relative">
          <input type="password" id="login-password" name="password" required class="form-control" placeholder="••••••••" style="padding-left: 2.5rem;">
          <i class="bi bi-lock position-absolute text-muted" style="left: 1rem; top: 50%; transform: translateY(-50%);"></i>
        </div>
      </div>

      <!-- Botón Ingresar -->
      <button type="submit" id="btn-login-submit" class="btn btn-primary w-100 fw-bold py-2">
        Ingresar al Panel
      </button>
    </form>

    <div class="text-center mt-3 pt-3 border-top border-secondary">
      <p class="form-label text-muted small fw-semibold uppercase">
        <i class="text-muted small fw-semibold uppercase"></i> Conexión encriptada vía SHA-256
      </p>
    </div>
  </div>
</section>
