<div class="d-flex flex-wrap justify-content-between gap-3 align-items-center mb-4">
  <div>
    <h2 class="h4 mb-1 font-weight-bold">Calendario de Vencimientos</h2>
    <p class="muted small mb-0">Vista mensual unificada de obligaciones impositivas</p>
  </div>
  <input class="form-control" style="max-width: 220px" type="month" id="cal-month" onchange="refreshCalendar()">
</div>

<div class="calendar-grid mb-2 fw-semibold muted text-center bg-transparent border-0">
  <div>Lun</div><div>Mar</div><div>Mié</div><div>Jue</div><div>Vie</div><div>Sáb</div><div>Dom</div>
</div>
<div class="calendar-grid" id="calendar-grid"></div>

<!-- Modal de Modificación de Estados e Historial -->
<div class="modal fade" id="task-modal" tabindex="-1">
  <div class="modal-dialog">
    <form class="modal-content card-ui" id="task-form">
      <div class="modal-header border-0 pb-0">
        <h5 class="modal-title fw-bold" id="task-title"></h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body space-y-3">
        <input type="hidden" name="ID_Vencimiento">
        
        <div class="mb-3">
          <label class="form-label small fw-semibold text-muted">Estado Actual</label>
          <select class="form-select font-medium" name="Estado" id="modal-select-estado">
            <!-- Se inyecta dinámicamente desde Scripts.html -->
          </select>
        </div>
        
        <div class="mb-2">
          <label class="form-label small fw-semibold text-muted">Observaciones / Comentarios Recientes</label>
          <textarea class="form-control text-sm" name="Comentario" rows="3" placeholder="Escribí notas internas para el equipo..."></textarea>
        </div>
      </div>
      <div class="modal-footer border-0 pt-0">
        <button type="button" class="btn btn-outline-secondary btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-brand btn-sm px-4" type="submit">Guardar Cambios</button>
      </div>
    </form>
  </div>
</div>
